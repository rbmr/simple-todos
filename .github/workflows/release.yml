name: Release

# On every push to main: build the signed release APK (same reusable job
# preflight.yml runs on PRs) and publish it as a GitHub Release asset —
# the standard place to distribute a standalone APK from a GitHub repo.

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    uses: ./.github/workflows/android-build.yml
    secrets: inherit

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: app-release-apk
          path: dist

      - name: Determine release tag
        id: tag
        run: echo "tag=build-${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Build #${{ github.run_number }} (${{ github.sha }})"
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: dist/app-release.apk
