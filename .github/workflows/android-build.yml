name: Android Build

# Reusable workflow: the single source of truth for building a signed release
# APK. preflight.yml (PRs into main) and release.yml (pushes to main) both
# call this workflow, so a green preflight run is proof the release build
# will also succeed — they execute the identical job.

on:
  workflow_call:
    outputs:
      apk-path:
        description: Path to the built release APK
        value: ${{ jobs.build.outputs.apk-path }}

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      apk-path: ${{ steps.locate-apk.outputs.path }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          mkdir -p keystore
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > keystore/release.jks

      - name: Run unit tests
        run: ./gradlew test --no-daemon

      - name: Build signed release APK
        env:
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/keystore/release.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Locate APK
        id: locate-apk
        run: echo "path=app/build/outputs/apk/release/app-release.apk" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: ${{ steps.locate-apk.outputs.path }}
          retention-days: 14
